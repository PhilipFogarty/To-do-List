<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="todo-app">
        <div class="app-header">
            <img src="imagens/icon.png" alt="ícone">
            <h2>To-Do List</h2>
        </div>
        <p class="subtitle">Organize suas tarefas do dia</p>
        <div class="row">
            <input type="text" id="input-box" placeholder="Nova tarefa…">
            <button onclick="addTask()">Adicionar</button>
        </div>
        <ul id="list-container"></ul>
        <div class="footer-info">Clique na tarefa para marcar como concluída</div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
